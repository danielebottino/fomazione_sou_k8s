- name: Lab K8s Deploy
  hosts: k8lab
  vars_files:
    - Varploy.yml
  tasks:
    - name: Software Installation
      tags: Softwares
      community.general.homebrew:
        name: "{{ item }}"
        state: present
      loop:
        - docker
        - minikube
        - kubernetes-cli

    - name: Creating K8s-Net
      community.general.docker_network:
        name: K8s-Net
        ipam_config:
          - subnet: 192.168.49.0/24
            gateway: 192.168.49.1
        driver: bridge
        state: present

    - name: Deploying Jenkins Container
      ansible.builtin.docker_container:
        name: Jenkins-Container
        image: jenkins/jenkins
        ports:
          - "8080:8080"
          - "50000:50000"
        volumes:
          - "jenkins_home:/var/jenkins_home"
        networks:
          - name: K8s-Net
            ipv4_address: "{{ jenkins_ip }}"

    - name: Checking if a Cluster already exists
      ansible.builtin.command: minikube status
      register: minikube_cluster_check
      failed_when: false
      changed_when: false
    
    - name: Starting a Minikube Cluster
      ansible.builtin.command: minikube start --driver=docker
      when: minikube_cluster_check.rc != 0

    - name: Deploying Worker Nodes
      tags: Worker
      ansible.builtin.docker_container:
        name: "{{ item.value.identification }}"
        image: ubuntu
        state: present
        command: sleep infinity
        networks:
          - name: K8s-Net
            ipv4_address: "{{ item.value.indirizzo }}"
      loop: "{{ workers|dict2items }}"  

      
        
        
        
